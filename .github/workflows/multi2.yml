name: Trigger All Workflows Parallel - alexwin

on:
  workflow_dispatch:

jobs:
  trigger_parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - uses: actions/checkout@v3

      - name: Launch and Monitor All Lines
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: alexwin007/rapidgator
          PASTEBIN_URL: https://pastebin.com/raw/gGFrt0Ci
        run: |
          # 1. Fetch URLs and get count
          content=$(curl -sL $PASTEBIN_URL | sed '/^\s*$/d')
          lines=$(echo "$content" | wc -l)
          echo "Found $lines lines. Launching all workflows..."

          # 2. Define the monitoring function
          monitor_line() {
            local i=$1
            local workflow_name="Ubuntu - Rapidgator_Multiline - line $i"
            local success=false
            local attempt=1
            
            while [ $attempt -le 3 ] && [ "$success" = false ]; do
              echo "[Line $i] Starting Attempt $attempt..."
              
              # Trigger
              gh workflow run "$workflow_name" --repo "$REPO"
              sleep 30 # Wait for API to register
              
              # Find Run ID (look for one that isn't completed)
              run_id=$(gh run list --workflow "$workflow_name" --repo "$REPO" --limit 5 --json databaseId,status --jq '.[] | select(.status != "completed") | .databaseId' | head -n 1)
              
              if [ -z "$run_id" ] || [ "$run_id" == "null" ]; then
                echo "[Line $i] Run ID not found. Retrying trigger..."
                attempt=$((attempt + 1))
                continue
              fi

              echo "[Line $i] Monitoring Run: $run_id"
              gh run watch "$run_id" --repo "$REPO" || true
              
              # Check Results
              run_data=$(gh run view "$run_id" --repo "$REPO" --json conclusion,createdAt,updatedAt)
              conclusion=$(echo "$run_data" | jq -r '.conclusion')
              start_s=$(date -d $(echo "$run_data" | jq -r '.createdAt') +%s)
              end_s=$(date -d $(echo "$run_data" | jq -r '.updatedAt') +%s)
              duration=$((end_s - start_s))

              if [ "$conclusion" == "success" ] && [ "$duration" -ge 120 ]; then
                echo "✅ [Line $i] SUCCESS (Duration: ${duration}s)"
                success=true
              else
                echo "❌ [Line $i] FAILED or SHORT (Status: $conclusion, Time: ${duration}s). Rerunning..."
                attempt=$((attempt + 1))
                sleep 20
              fi
            done
          }

          # 3. Launch all monitors in the background
          for i in $(seq 1 $lines); do
            monitor_line "$i" & 
            
            # Tiny delay between triggers to prevent GitHub API 403/429 throttling
            if [ "$i" -eq 4 ]; then sleep 10; else sleep 2; fi
          done

          # 4. Wait for all background processes to finish
          wait
          echo "All lines processed."
