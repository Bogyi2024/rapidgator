name: Trigger Multiple Workflows - monsterhunters

on:
  workflow_dispatch:

jobs:
  trigger_workflows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Monitor and Rerun Workflows
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_NEW }}
          REPO: monsterhunters/rapidgator
          PASTEBIN_URL: https://pastebin.com/raw/gGFrt0Ci
        run: |
          # Fetch and clean the list
          content=$(curl -sL $PASTEBIN_URL | sed '/^\s*$/d')
          total_lines=$(echo "$content" | wc -l)
          
          echo "Found $total_lines URLs. Starting processing loop..."

          current_line=0
          echo "$content" | while IFS= read -r line_content; do
            current_line=$((current_line + 1))
            workflow_name="Ubuntu - Rapidgator_Multiline - line $current_line"
            
            attempt=1
            max_attempts=3
            success=false

            while [ $attempt -le $max_attempts ] && [ "$success" = false ]; do
              echo "--- [Line $current_line] Attempt $attempt ---"
              
              # 1. Trigger the workflow
              gh workflow run "$workflow_name" --repo "$REPO"
              sleep 15 # Wait for GitHub API to index the new run

              # 2. Grab the ID of the most recent run for this specific workflow
              run_id=$(gh run list --workflow "$workflow_name" --repo "$REPO" --limit 1 --json databaseId --jq '.[0].databaseId')

              if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
                echo "Monitoring Run ID: $run_id"
                
                # 3. Watch the run until it completes
                gh run watch "$run_id" --repo "$REPO" || true
                
                # 4. Fetch details to check duration and outcome
                run_data=$(gh run view "$run_id" --repo "$REPO" --json conclusion,createdAt,updatedAt)
                conclusion=$(echo "$run_data" | jq -r '.conclusion')
                
                # Convert timestamps to Unix seconds
                start_s=$(date -d $(echo "$run_data" | jq -r '.createdAt') +%s)
                end_s=$(date -d $(echo "$run_data" | jq -r '.updatedAt') +%s)
                duration=$((end_s - start_s))

                echo "Result: $conclusion | Duration: ${duration}s"

                # 5. Logic: Pass only if successful AND ran for >= 120 seconds
                if [ "$conclusion" == "success" ] && [ "$duration" -ge 120 ]; then
                  echo "✅ Line $current_line verified."
                  success=true
                else
                  echo "⚠️ Criteria not met (Fail or < 2min). Retrying..."
                  attempt=$((attempt + 1))
                  [ $attempt -le $max_attempts ] && sleep 20
                fi
              else
                echo "❌ Failed to find Run ID. Retrying trigger..."
                attempt=$((attempt + 1))
                sleep 10
              fi
            done

            # Maintain your custom interval logic
            if [ "$current_line" -eq 4 ]; then
              echo "Line 4 complete. Sleeping 40s..."
              sleep 40
            else
              echo "Moving to next line..."
              sleep 2
            fi
          done
