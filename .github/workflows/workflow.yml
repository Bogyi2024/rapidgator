name: Rapidgator to HF Batch
on:
  workflow_dispatch:
    inputs:
      source_type:
        description: 'Source Type'
        required: false
        type: string
      rg_email:
        required: true
      rg_password:
        required: true
      rg_links:
        required: true
      hf_token:
        required: true
      repo_id:
        required: true
      repo_type:
        required: true

jobs:
  prepare_links:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Safely capture multiline input from React
          cat << 'EOF' > links.txt
          ${{ github.event.inputs.rg_links }}
          EOF
          
          # Convert lines into a clean JSON array for the matrix
          JSON_ARRAY=$(grep -v '^$' links.txt | jq -R . | jq -s -c .)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  download_and_upload:
    needs: prepare_links
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        link: ${{ fromJson(needs.prepare_links.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          pip install requests huggingface-hub

      - name: Execute Transfer with 2-Min Watchdog
        env:
          RG_EMAIL: ${{ github.event.inputs.rg_email }}
          RG_PASSWORD: ${{ github.event.inputs.rg_password }}
          RG_LINK: ${{ matrix.link }}
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
          REPO_ID: ${{ github.event.inputs.repo_id }}
          REPO_TYPE: ${{ github.event.inputs.repo_type }}
        run: |
          # 1. Disable "exit on error" so the loop doesn't break when Python fails
          set +e 
          
          success=false
          max_retries=5
          attempt=1
          
          while [ "$success" = false ] && [ "$attempt" -le "$max_retries" ]; do
            echo "▶️ Attempt $attempt of $max_retries..."
            start_time=$(date +%s)
            
            # 2. Run your script
            python rpgx.py
            exit_code=$?
            
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            
            echo "⏱️ Job duration: $duration seconds (Exit Code: $exit_code)"
            
            # 3. WATCHDOG LOGIC: 
            # Retry if the script crashed (exit_code != 0) 
            # OR if it finished suspiciously fast (< 120 seconds)
            if [ "$exit_code" -ne 0 ] || [ "$duration" -lt 120 ]; then
              if [ "$exit_code" -ne 0 ]; then
                echo "⚠️ ERROR: Python script crashed (Login or connection failed)."
              fi
              if [ "$duration" -lt 120 ]; then
                echo "⚠️ ERROR: Finished too fast ($duration s). Minimum required is 120s!"
              fi
              
              echo "🔄 Retrying in 20 seconds..."
              sleep 20
              attempt=$((attempt + 1))
            else
              echo "✅ SUCCESS: Job completed securely in $duration seconds."
              success=true
            fi
          done

          # 4. If all retries fail, exit with an error so GitHub shows a red 'X'
          if [ "$success" = false ]; then
            echo "❌ CRITICAL: Job failed after $max_retries attempts."
            exit 1
          fi
