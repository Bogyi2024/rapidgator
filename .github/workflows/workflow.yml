name: Rapidgator to HF Batch
on:
  workflow_dispatch:
    inputs:
      # Add this block here:
      source_type:
        description: 'Source Type'
        required: false
        type: string
      rg_email:
        required: true
      rg_password:
        required: true
      rg_links:
        required: true
      hf_token:
        required: true
      repo_id:
        required: true
      repo_type:
        required: true

jobs:
  prepare_links:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Safely capture multiline input from React
          cat << 'EOF' > links.txt
          ${{ github.event.inputs.rg_links }}
          EOF
          
          # Convert lines into a clean JSON array for the matrix
          JSON_ARRAY=$(grep -v '^$' links.txt | jq -R . | jq -s -c .)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  download_and_upload:
    needs: prepare_links
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        link: ${{ fromJson(needs.prepare_links.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          pip install requests huggingface-hub

      - name: Execute Transfer with 2-Min Watchdog
        env:
          RG_EMAIL: ${{ github.event.inputs.rg_email }}
          RG_PASSWORD: ${{ github.event.inputs.rg_password }}
          RG_LINK: ${{ matrix.link }}
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
          REPO_ID: ${{ github.event.inputs.repo_id }}
          REPO_TYPE: ${{ github.event.inputs.repo_type }}
        run: |
          success=false
          max_retries=5
          attempt=1
          while [ "$success" = false ] && [ "$attempt" -le "$max_retries" ]; do
            echo "▶️ Attempt $attempt of $max_retries..."
            start_time=$(date +%s)
            
            # Ensure this path matches your script location
            python dep_download/rpgx.py
            exit_code=$?
            
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            
            if [ "$duration" -lt 120 ] || [ "$exit_code" -ne 0 ]; then
              echo "⚠️ Failed or finished too fast ($duration s). Retrying in 15s..."
              sleep 15
              attempt=$((attempt + 1))
            else
              echo "✅ Success! Ran for $duration seconds."
              success=true
            fi
          done
