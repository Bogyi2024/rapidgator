name: Trigger Multiple Workflows - alexwin

on:
  workflow_dispatch:

jobs:
  trigger_workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 600 # Prevents the master workflow from timing out early

    steps:
      - uses: actions/checkout@v3

      - name: Trigger, Monitor, and Auto-Rerun
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: Bogyi2024/rapidgator
          PASTEBIN_URL: https://pastebin.com/raw/gGFrt0Ci
        run: |
          # Fetch and clean content
          content=$(curl -sL $PASTEBIN_URL | sed '/^\s*$/d')
          lines=$(echo "$content" | wc -l)
          
          echo "Found $lines URLs. Starting processing..."

          for i in $(seq 1 $lines); do
            workflow_name="Ubuntu - Rapidgator_Multiline - line $i"
            
            attempt=1
            max_attempts=3
            success=false

            while [ $attempt -le $max_attempts ] && [ "$success" = false ]; do
              echo "--- [Line $i] Attempt $attempt ---"
              
              # 1. Trigger the workflow
              gh workflow run "$workflow_name" --repo "$REPO"
              
              # 2. Wait for API propagation (Required to avoid 'stuck' old runs)
              sleep 20 

              # 3. Find the NEWEST run ID that is NOT completed
              run_id=$(gh run list --workflow "$workflow_name" --repo "$REPO" --limit 5 --json databaseId,status --jq '.[] | select(.status != "completed") | .databaseId' | head -n 1)

              if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
                echo "Watching Run ID: $run_id"
                
                # 4. Watch the run until it finishes
                # timeout ensures we don't hang forever if GH CLI glitches
                timeout 30m gh run watch "$run_id" --repo "$REPO" || echo "Watch stopped."
                
                # 5. Evaluate the result
                run_data=$(gh run view "$run_id" --repo "$REPO" --json conclusion,createdAt,updatedAt)
                conclusion=$(echo "$run_data" | jq -r '.conclusion')
                
                # Calculate Duration
                start_time=$(date -d $(echo "$run_data" | jq -r '.createdAt') +%s)
                end_time=$(date -d $(echo "$run_data" | jq -r '.updatedAt') +%s)
                duration=$((end_time - start_time))

                echo "Finished with status: $conclusion (Duration: ${duration}s)"

                # 6. Success check (Status Success AND Duration >= 120s)
                if [ "$conclusion" == "success" ] && [ "$duration" -ge 120 ]; then
                  echo "✅ Line $i passed."
                  success=true
                else
                  echo "⚠️ Failure or run too short (< 2 min). Attempt $attempt failed."
                  attempt=$((attempt + 1))
                  [ $attempt -le $max_attempts ] && sleep 15
                fi
              else
                echo "❌ No active run detected. Retrying trigger..."
                attempt=$((attempt + 1))
                sleep 10
              fi
            done

            # Your custom sleep logic
            if [ "$i" -eq 4 ]; then
              echo "Sleeping 40 seconds after line 4"
              sleep 40
            else
              echo "Sleeping 5 seconds before next line"
              sleep 5
            fi
          done
