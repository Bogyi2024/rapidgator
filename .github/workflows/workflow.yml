name: Rapidgator to HF Batch
on:
  workflow_dispatch:
    inputs:
      source_type:
        description: 'Source Type'
        required: false
        type: string
      rg_email:
        required: true
      rg_password:
        required: true
      rg_links:
        required: true
      hf_token:
        required: true
      repo_id:
        required: true
      repo_type:
        required: true
      worker_pool:
        required: false
        default: '[]'
      master_owner:
        required: false
      master_repo:
        required: false
      master_token:
        required: false

jobs:
  prepare_links:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > links.txt
          ${{ github.event.inputs.rg_links }}
          EOF
          JSON_ARRAY=$(grep -v '^$' links.txt | jq -R . | jq -s -c .)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  download_and_upload:
    needs: prepare_links
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        link: ${{ fromJson(needs.prepare_links.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          pip install requests huggingface-hub

      - name: Execute Transfer with Smart Watchdog
        env:
          RG_EMAIL: ${{ github.event.inputs.rg_email }}
          RG_PASSWORD: ${{ github.event.inputs.rg_password }}
          RG_LINK: ${{ matrix.link }}
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
          REPO_ID: ${{ github.event.inputs.repo_id }}
          REPO_TYPE: ${{ github.event.inputs.repo_type }}
          # Orchestrator Variables passed to Python
          WORKER_POOL: ${{ github.event.inputs.worker_pool }}
          MASTER_OWNER: ${{ github.event.inputs.master_owner }}
          MASTER_REPO: ${{ github.event.inputs.master_repo }}
          MASTER_TOKEN: ${{ github.event.inputs.master_token }}
        run: |
          set +e 
          
          # Wait based on job-index to stagger logins and prevent IP blocking
          DELAY=$(( ${{ strategy.job-index }} * 15 ))
          echo "⏳ Waiting $DELAY seconds to prevent login collision..."
          sleep $DELAY
          
          success=false
          max_retries=5
          attempt=1
          
          while [ "$success" = false ] && [ "$attempt" -le "$max_retries" ]; do
            echo "▶️ Attempt $attempt of $max_retries..."
            start_time=$(date +%s)
            
            python rpgx.py
            exit_code=$?
            
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            
            echo "⏱️ Job duration: $duration seconds (Exit Code: $exit_code)"
            
            # SMART WATCHDOG: Check for Handoff signal
            if [ "$exit_code" -eq 42 ]; then
               echo "✅ IP Block detected, but Webhook successfully sent to Master."
               echo "This runner is shutting down gracefully to let the next worker handle it."
               success=true
               break
            fi
            
            if [ "$exit_code" -ne 0 ] || [ "$duration" -lt 120 ]; then
              if [ "$exit_code" -ne 0 ]; then echo "⚠️ ERROR: Python script crashed."; fi
              if [ "$duration" -lt 120 ]; then echo "⚠️ ERROR: Finished too fast ($duration s)."; fi
              
              echo "🔄 Retrying in 20 seconds..."
              sleep 20
              attempt=$((attempt + 1))
            else
              echo "✅ SUCCESS: Job completed securely in $duration seconds."
              success=true
            fi
          done

          if [ "$success" = false ]; then
            echo "❌ CRITICAL: Job failed after $max_retries attempts."
            exit 1
          fi
