name: Trigger Multiple Workflows - monsterhunters

on:
  workflow_dispatch:

jobs:
  trigger_workflows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Trigger, Monitor, and Auto-Rerun
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_NEW_2 }}
          REPO: monsterhunters/rapidgator
          PASTEBIN_URL: https://pastebin.com/raw/gGFrt0Ci
        run: |
          # Fetch and clean content (removing empty lines)
          content=$(curl -sL $PASTEBIN_URL | sed '/^\s*$/d')
          lines=$(echo "$content" | wc -l)
          
          echo "Found $lines URLs. Starting processing..."

          count=0
          echo "$content" | while IFS= read -r line; do
            count=$((count + 1))
            workflow_name="Ubuntu - Rapidgator_Multiline - line $count"
            
            attempt=1
            max_attempts=3
            success=false

            while [ $attempt -le $max_attempts ] && [ "$success" = false ]; do
              echo "--- Line $count: Attempt $attempt ---"
              
              # 1. Trigger the workflow
              gh workflow run "$workflow_name" --repo "$REPO"
              sleep 10 # Wait for GitHub API to register the run

              # 2. Get the ID of the run we just started
              run_id=$(gh run list --workflow "$workflow_name" --repo "$REPO" --limit 1 --json databaseId --jq '.[0].databaseId')

              if [ -n "$run_id" ]; then
                echo "Watching Run ID: $run_id"
                
                # 3. Watch the workflow until it finishes
                gh run watch "$run_id" --repo "$REPO" || true
                
                # 4. Analyze results
                run_data=$(gh run view "$run_id" --repo "$REPO" --json conclusion,createdAt,updatedAt)
                conclusion=$(echo "$run_data" | jq -r '.conclusion')
                
                # Calculate duration in seconds
                start_time=$(date -d $(echo "$run_data" | jq -r '.createdAt') +%s)
                end_time=$(date -d $(echo "$run_data" | jq -r '.updatedAt') +%s)
                duration=$((end_time - start_time))

                echo "Workflow finished with status: $conclusion (Duration: ${duration}s)"

                # 5. Logic: Success if status is success AND ran for at least 120 seconds (2 min)
                if [ "$conclusion" == "success" ] && [ "$duration" -ge 120 ]; then
                  echo "✅ Success: Line $count passed requirements."
                  success=true
                else
                  echo "⚠️ Failure or short run (< 2 min). Retrying in 15s..."
                  attempt=$((attempt + 1))
                  sleep 15
                fi
              else
                echo "❌ Error: Could not capture Run ID. Retrying trigger..."
                attempt=$((attempt + 1))
              fi
            done

            # Maintain your custom sleep logic between different line items
            if [ "$count" -eq 4 ]; then
              echo "Finished line 4. Sleeping 40s per your rules..."
              sleep 40
            else
              sleep 2
            fi
          done
